<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Intelligence Platform</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 60px;
            background-color: #f5f7fa;
        }

        h1 {
            color: #1f2937;
        }

        p {
            color: #4b5563;
            font-size: 18px;
            max-width: 700px;
            margin: auto;
        }

        .buttons {
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        #signup-btn {
            background-color: #2563eb;
            color: white;
        }

        #demo-btn {
            background-color: #10b981;
            color: white;
        }
    </style>

    <!-- Amplitude SDK -->
    <script src="https://cdn.amplitude.com/script/47b8a978fd7489fec678c3b9740e6e65.engagement.js"></script>

    <script>
        window.amplitude.add(window.sessionReplay.plugin({sampleRate: 1}));

        window.amplitude.init('47b8a978fd7489fec678c3b9740e6e65', {
            fetchRemoteConfig: true,
            autocapture: true
        });

        window.amplitude.track('page_viewed');
    </script>

</head>
<body>

    <h1>AI Resume Intelligence Platform</h1>

    <p>
        Get AI-powered resume analysis, ATS scoring,
        skill extraction, and personalized career recommendations.
    </p>

    <div class="buttons">
        <button id="signup-btn">Sign Up</button>
        <button id="demo-btn">Request Demo</button>
    </div>

    <script>
        document.getElementById('signup-btn').addEventListener('click', function () {
            window.amplitude.track('sign_up_clicked');
            alert('Sign Up clicked');
        });

        document.getElementById('demo-btn').addEventListener('click', function () {
            window.amplitude.track('request_demo_clicked');
            alert('Request Demo clicked');
        });
    </script>

</body>
</html>
